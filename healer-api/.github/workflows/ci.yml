name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Your actual build / test job ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # ── AI Healer: fires ONLY when the build job fails ──────────────────────────
  notify-ai-healer:
    runs-on: ubuntu-latest
    needs: [build]
    if: failure()           # Only runs if the build job above fails
    steps:
      - name: Trigger n8n AI Healer webhook
        run: |
          curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id":     "${{ github.run_id }}",
              "repo":       "${{ github.repository }}",
              "branch":     "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "actor":      "${{ github.actor }}",
              "workflow":   "${{ github.workflow }}"
            }'
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
